<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission JEE</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🎮 Mission JEE</h1>

<div class="stats">

<div class="card">
<h2>Level</h2>
<span id="level">1</span>
</div>
<div class="card">
    <h2>Streak</h2>
    <span id="streak">0 Days</span>
</div>
<div class="card">
<h2>XP</h2>
<span id="xp">0</span>
</div>

<div class="card">
<h2>Coins</h2>
<span id="coins">0</span>
</div>

</div>

<div class="progress">
<div class="progress-bar"></div>
</div>
<div class="card">
  <h2>Achievements 🏆</h2>
  <div id="achievements">
    No achievements yet
  </div>
</div>
<div class="missions"> 

<div class="mission">
<h3>📘 Complete Chemistry Lecture</h3>
<button class="complete-btn" id="mission1" onclick="completeMission(this)">Complete</button>
</div>

<div class="mission">
<h3>📗 Solve 20 Maths Questions</h3>
<button class="complete-btn" onclick="completeMission(this)">Complete</button>
</div>

<div class="mission">
<h3>⚡ Revise Physics Formula</h3>
<button class="complete-btn" onclick="completeMission(this)">Complete</button>
</div>
<div class="add-mission">
  <input type="text" id="newMission" placeholder="New Mission">
  <button onclick="addMission()">Add Mission</button>
</div>

<div id="customMissions"></div>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
